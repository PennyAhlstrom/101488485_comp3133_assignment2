<div class="d-flex flex-column gap-4">
  <div class="card page-card">
    <div class="card-body d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
      <div>
        <h1 class="h3 page-title">Employees</h1>
        <p class="page-subtitle">View, search, add, edit, and delete employee records.</p>
      </div>

      <div class="d-flex gap-2 flex-wrap">
        <a class="btn btn-primary" routerLink="/employees/new">Add Employee</a>
      </div>
    </div>
  </div>

  <app-employee-search-bar (search)="onSearch($event)" (reset)="viewAll()" />

  <app-loading-spinner *ngIf="isLoading" />

  <div *ngIf="!isLoading && errorMessage">
    <app-error-message [message]="errorMessage" />
  </div>

  <app-empty-state
    *ngIf="!isLoading && !errorMessage && employees.length === 0"
    message="No employees found.">
  </app-empty-state>

  <div class="card page-card" *ngIf="!isLoading && employees.length > 0">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Position</th>
              <th>Department</th>
              <th>Salary</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let employee of employees">
              <td class="fw-semibold">{{ employee | employeeName }}</td>
              <td>{{ employee.email }}</td>
              <td>{{ employee.designation }}</td>
              <td>{{ employee.department }}</td>
              <td>{{ employee.salary | currency }}</td>
              <td class="text-end">
                <div class="table-actions justify-content-end">
                  <button class="btn btn-sm btn-outline-primary" type="button" (click)="viewEmployee(employee.id)">
                    View
                  </button>
                  <button class="btn btn-sm btn-outline-secondary" type="button" (click)="editEmployee(employee.id)">
                    Edit
                  </button>
                  <button class="btn btn-sm btn-outline-danger" type="button" (click)="deleteEmployee(employee)">
                    Delete
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
