<div class="section-gap">
  <div class="page-header card-surface">
    <div>
      <h1>Employees</h1>
      <p class="muted">View, search, edit, and manage employee records.</p>
    </div>

    <div class="actions-row">
      <button mat-stroked-button type="button" (click)="viewAll()">View All</button>
      <a mat-raised-button color="primary" routerLink="/employees/new">Add Employee</a>
    </div>
  </div>

  <app-employee-search-bar
    (search)="onSearch($event)"
    (reset)="viewAll()"
  />

  <app-loading-spinner *ngIf="isLoading" />
  <app-error-message *ngIf="!isLoading && errorMessage" [message]="errorMessage" />
  <app-empty-state *ngIf="!isLoading && !errorMessage && employees.length === 0" message="No employees found." />

  <div class="table-wrap card-surface" *ngIf="!isLoading && employees.length > 0">
    <table mat-table [dataSource]="employees" class="full-width">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let employee">{{ employee.first_name }} {{ employee.last_name }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let employee">{{ employee.email }}</td>
      </ng-container>

      <ng-container matColumnDef="designation">
        <th mat-header-cell *matHeaderCellDef>Designation</th>
        <td mat-cell *matCellDef="let employee">{{ employee.designation }}</td>
      </ng-container>

      <ng-container matColumnDef="department">
        <th mat-header-cell *matHeaderCellDef>Department</th>
        <td mat-cell *matCellDef="let employee">{{ employee.department }}</td>
      </ng-container>

      <ng-container matColumnDef="salary">
        <th mat-header-cell *matHeaderCellDef>Salary</th>
        <td mat-cell *matCellDef="let employee">{{ employee.salary | currency }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let employee">
          <div class="actions-row">
            <button mat-stroked-button type="button" (click)="viewEmployee(employee.id)">View</button>
            <button mat-stroked-button type="button" (click)="editEmployee(employee.id)">Edit</button>
            <button mat-stroked-button color="warn" type="button" (click)="deleteEmployee(employee.id)">Delete</button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
