<mat-card class="card-surface form-card">
  <div class="stack-lg">
    <div class="stack-sm">
      <h1>{{ isEditMode ? 'Edit Employee' : 'Add Employee' }}</h1>
      <p class="muted">{{ isEditMode ? 'Update employee information.' : 'Create a new employee record.' }}</p>
    </div>

    <app-error-message *ngIf="errorMessage" [message]="errorMessage" />

    <form class="form-grid" [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline">
        <mat-label>First Name</mat-label>
        <input matInput formControlName="first_name" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Last Name</mat-label>
        <input matInput formControlName="last_name" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Gender</mat-label>
        <mat-select formControlName="gender">
          <mat-option value="Male">Male</mat-option>
          <mat-option value="Female">Female</mat-option>
          <mat-option value="Other">Other</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Designation</mat-label>
        <input matInput formControlName="designation" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Department</mat-label>
        <input matInput formControlName="department" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Salary</mat-label>
        <input matInput type="number" formControlName="salary" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Date of Joining</mat-label>
        <input matInput type="date" formControlName="date_of_joining" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-span">
        <mat-label>Employee Photo URL</mat-label>
        <input matInput formControlName="employee_photo" />
      </mat-form-field>

      <div class="full-span stack-sm">
        <label for="employeeFile"><strong>Upload Profile Photo</strong></label>
        <input id="employeeFile" type="file" accept="image/*" (change)="onFileSelected($event)" />
      </div>

      <div class="actions-row full-span">
        <button mat-raised-button color="primary" type="submit" [disabled]="isSubmitting">
          {{ isEditMode ? 'Update' : 'Create' }}
        </button>
        <button mat-stroked-button type="button" routerLink="/employees">Cancel</button>
      </div>
    </form>
  </div>
</mat-card>
