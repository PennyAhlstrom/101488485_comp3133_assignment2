<mat-card class="card-surface form-card">
  <div class="stack-lg">
    <div class="stack-sm">
      <h1>{{ isEditMode ? 'Edit Employee' : 'Add Employee' }}</h1>
      <p class="muted">
        {{ isEditMode ? 'Update employee information.' : 'Create a new employee record.' }}
      </p>
    </div>

    <app-error-message *ngIf="errorMessage" [message]="errorMessage" />

    <form class="form-grid" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field-group">
        <label class="field-label" for="first_name">First Name</label>
        <mat-form-field appearance="outline" class="full-width">
          <input id="first_name" matInput formControlName="first_name" />
        </mat-form-field>
      </div>

      <div class="field-group">
        <label class="field-label" for="last_name">Last Name</label>
        <mat-form-field appearance="outline" class="full-width">
          <input id="last_name" matInput formControlName="last_name" />
        </mat-form-field>
      </div>

      <div class="field-group">
        <label class="field-label" for="email">Email</label>
        <mat-form-field appearance="outline" class="full-width">
          <input id="email" matInput type="email" formControlName="email" />
        </mat-form-field>
      </div>

      <div class="field-group">
        <label class="field-label" for="gender">Gender</label>
        <select id="gender" class="native-select" formControlName="gender">
          <option value="">Select gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="field-group">
        <label class="field-label" for="designation">Designation</label>
        <mat-form-field appearance="outline" class="full-width">
          <input id="designation" matInput formControlName="designation" />
        </mat-form-field>
      </div>

      <div class="field-group">
        <label class="field-label" for="department">Department</label>
        <mat-form-field appearance="outline" class="full-width">
          <input id="department" matInput formControlName="department" />
        </mat-form-field>
      </div>

      <div class="field-group">
        <label class="field-label" for="salary">Salary</label>
        <mat-form-field appearance="outline" class="full-width">
          <input id="salary" matInput type="number" formControlName="salary" />
        </mat-form-field>
      </div>

      <div class="field-group">
        <label class="field-label" for="date_of_joining">Date of Joining</label>
        <mat-form-field appearance="outline" class="full-width">
          <input id="date_of_joining" matInput type="date" formControlName="date_of_joining" />
        </mat-form-field>
      </div>

      <div class="field-group full-span">
        <label class="field-label" for="employee_photo">Employee Photo URL</label>
        <mat-form-field appearance="outline" class="full-width">
          <input id="employee_photo" matInput formControlName="employee_photo" />
        </mat-form-field>
      </div>

      <div class="full-span stack-sm">
        <label class="field-label" for="employeeFile">Upload Profile Photo</label>
        <input id="employeeFile" type="file" accept="image/*" (change)="onFileSelected($event)" />
      </div>

      <div class="actions-row full-span">
        <a mat-stroked-button routerLink="/employees">Back</a>
        <button mat-raised-button color="primary" type="submit" [disabled]="isSubmitting">
          {{ isEditMode ? 'Update Employee' : 'Create Employee' }}
        </button>
      </div>
    </form>
  </div>
</mat-card>
