<app-loading-spinner *ngIf="isLoading" />
<app-error-message *ngIf="!isLoading && errorMessage" [message]="errorMessage" />

<mat-card *ngIf="!isLoading && employee" class="card-surface details-card">
  <div class="details-grid">
    <img *ngIf="employee.employee_photo" [src]="employee.employee_photo" [alt]="employee.first_name" class="photo" />

    <div class="stack-md">
      <h1>{{ employee.first_name }} {{ employee.last_name }}</h1>
      <p><strong>Email:</strong> {{ employee.email }}</p>
      <p><strong>Gender:</strong> {{ employee.gender }}</p>
      <p><strong>Designation:</strong> {{ employee.designation }}</p>
      <p><strong>Department:</strong> {{ employee.department }}</p>
      <p><strong>Salary:</strong> {{ employee.salary | currency }}</p>
      <p><strong>Date of Joining:</strong> {{ employee.date_of_joining | date }}</p>

      <div class="actions-row">
        <a mat-raised-button color="primary" [routerLink]="['/employees', employee.id, 'edit']">Edit</a>
        <a mat-stroked-button routerLink="/employees">Back</a>
      </div>
    </div>
  </div>
</mat-card>
