<div class="card page-card">
  <div class="card-body">
    <form class="row g-3 align-items-end" [formGroup]="form" (ngSubmit)="submit()">
      <div class="col-12 col-md-5">
        <label class="form-label fw-semibold" for="designation">Position / Designation</label>
        <input
          id="designation"
          appAutofocus
          type="text"
          class="form-control"
          formControlName="designation"
          placeholder="e.g. Developer" />
      </div>

      <div class="col-12 col-md-5">
        <label class="form-label fw-semibold" for="department">Department</label>
        <input
          id="department"
          type="text"
          class="form-control"
          formControlName="department"
          placeholder="e.g. Engineering" />
      </div>

      <div class="col-12 col-md-2 d-grid gap-2">
        <button class="btn btn-primary" type="submit">Search</button>
        <button class="btn btn-outline-secondary" type="button" (click)="clear()">Clear</button>
      </div>
    </form>
  </div>
</div>
