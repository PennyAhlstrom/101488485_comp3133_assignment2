<div class="auth-page">
  <div class="card page-card auth-card">
    <div class="card-body p-4 p-md-5">
      <div class="mb-4">
        <h1 class="h3 page-title">Create Account</h1>
        <p class="page-subtitle">Register to manage employees and protected routes.</p>
      </div>

      <div class="mb-3" *ngIf="errorMessage">
        <app-error-message [message]="errorMessage" />
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="mb-3">
          <label class="form-label fw-semibold" for="signupUsername">Username</label>
          <input
            id="signupUsername"
            appAutofocus
            type="text"
            class="form-control"
            formControlName="username"
            [class.is-invalid]="f.username.touched && f.username.invalid" />
          <div class="invalid-feedback" *ngIf="f.username.touched && f.username.errors?.['required']">
            Username is required.
          </div>
          <div class="invalid-feedback" *ngIf="f.username.touched && f.username.errors?.['minlength']">
            Username must be at least 3 characters.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold" for="signupEmail">Email</label>
          <input
            id="signupEmail"
            type="email"
            class="form-control"
            formControlName="email"
            [class.is-invalid]="f.email.touched && f.email.invalid" />
          <div class="invalid-feedback" *ngIf="f.email.touched && f.email.errors?.['required']">
            Email is required.
          </div>
          <div class="invalid-feedback" *ngIf="f.email.touched && f.email.errors?.['email']">
            Enter a valid email address.
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold" for="signupPassword">Password</label>
          <input
            id="signupPassword"
            type="password"
            class="form-control"
            formControlName="password"
            [class.is-invalid]="f.password.touched && f.password.invalid" />
          <div class="invalid-feedback" *ngIf="f.password.touched && f.password.errors?.['required']">
            Password is required.
          </div>
          <div class="invalid-feedback" *ngIf="f.password.touched && f.password.errors?.['minlength']">
            Password must be at least 6 characters.
          </div>
        </div>

        <div class="d-grid mb-3">
          <button class="btn btn-primary btn-lg" type="submit" [disabled]="isSubmitting">
            <span *ngIf="!isSubmitting">Create Account</span>
            <span *ngIf="isSubmitting">Creating Account...</span>
          </button>
        </div>

        <div class="text-center">
          <span class="text-secondary">Already registered?</span>
          <a routerLink="/login" class="ms-1 fw-semibold">Back to sign in</a>
        </div>
      </form>

      <app-loading-spinner *ngIf="isSubmitting" />
    </div>
  </div>
</div>
