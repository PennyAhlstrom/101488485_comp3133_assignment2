<div class="auth-page">
  <mat-card class="auth-card card-surface">
    <div class="stack-lg">
      <div class="stack-sm">
        <h1>Login</h1>
        <p class="muted">Sign in to manage employees.</p>
      </div>

      <app-error-message *ngIf="errorMessage" [message]="errorMessage" />

      <form class="stack-md" [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" />
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="isSubmitting">
          Login
        </button>
      </form>

      <a routerLink="/signup">Create an account</a>

      <app-loading-spinner *ngIf="isSubmitting" />
    </div>
  </mat-card>
</div>
