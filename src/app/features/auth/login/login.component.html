<div class="auth-page">
  <div class="card page-card auth-card">
    <div class="card-body p-4 p-md-5">
      <div class="mb-4">
        <h1 class="h3 page-title">Sign In</h1>
        <p class="page-subtitle">Access the employee management dashboard.</p>
      </div>

      <div class="mb-3" *ngIf="errorMessage">
        <app-error-message [message]="errorMessage" />
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="mb-3">
          <label class="form-label fw-semibold" for="loginEmail">Email</label>
          <input
            id="loginEmail"
            appAutofocus
            type="email"
            class="form-control"
            formControlName="email"
            [class.is-invalid]="f.email.touched && f.email.invalid" />
          <div class="invalid-feedback" *ngIf="f.email.touched && f.email.errors?.['required']">
            Email is required.
          </div>
          <div class="invalid-feedback" *ngIf="f.email.touched && f.email.errors?.['email']">
            Enter a valid email address.
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold" for="loginPassword">Password</label>
          <input
            id="loginPassword"
            type="password"
            class="form-control"
            formControlName="password"
            [class.is-invalid]="f.password.touched && f.password.invalid" />
          <div class="invalid-feedback" *ngIf="f.password.touched && f.password.errors?.['required']">
            Password is required.
          </div>
        </div>

        <div class="d-grid mb-3">
          <button class="btn btn-primary btn-lg" type="submit" [disabled]="isSubmitting">
            <span *ngIf="!isSubmitting">Sign In</span>
            <span *ngIf="isSubmitting">Signing In...</span>
          </button>
        </div>

        <div class="text-center">
          <span class="text-secondary">Need an account?</span>
          <a routerLink="/signup" class="ms-1 fw-semibold">Create one</a>
        </div>
      </form>

      <app-loading-spinner *ngIf="isSubmitting" />
    </div>
  </div>
</div>
