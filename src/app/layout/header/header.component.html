<nav class="navbar navbar-expand-lg app-navbar shadow-sm">
  <div class="container-fluid page-shell">
    <a class="navbar-brand fw-semibold" routerLink="/employees">Employee Manager</a>

    <button

      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNavbar"
      aria-controls="mainNavbar"
      aria-expanded="false"
      aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>

          <a

            routerLink="/employees"

          </a>

          <a class="nav-link" routerLink="/employees/new" routerLinkActive="active-link">

          </a>

          <span class="navbar-text me-lg-2" *ngIf="sessionService.user() as user">

          </span>
        </li>

        <li class="nav-item">
          <button class="btn btn-outline-light btn-sm ms-lg-2 mt-2 mt-lg-0" type="button" (click)="logout()">
